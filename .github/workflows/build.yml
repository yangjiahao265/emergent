name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: ""
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            ext: ""
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            ext: ""
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            ext: ""
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: ".exe"

    runs-on: ${{ matrix.runner }}
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}

    steps:
      - uses: actions/checkout@v4

      # ─── Node.js & Frontend Build ────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock

      - name: Install frontend dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: yarn build

      - name: Copy frontend build to embed directory
        shell: bash
        run: |
          rm -rf cmd/emergent/frontend
          cp -r frontend/build cmd/emergent/frontend

      # ─── Go Build ────────────────────────────────────────────────────
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o emergent-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/emergent/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: emergent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: emergent-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  # ─── Release (only on tag push) ─────────────────────────────────────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
